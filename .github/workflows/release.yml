name: Release

on:
  push:
    branches:
      - master
    paths:
      - "build.gradle.kts"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-release:
    name: Detect Version Change
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.detect.outputs.release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Gradle version change
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' build.gradle.kts | head -n 1)"
          if [ -z "$current_version" ]; then
            echo "Could not find version in build.gradle.kts" >&2
            exit 1
          fi

          previous_version=""
          before_sha="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "push" ] && [ -n "$before_sha" ] && ! [[ "$before_sha" =~ ^0+$ ]]; then
            previous_version="$(git show "$before_sha:build.gradle.kts" 2>/dev/null | sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' | head -n 1 || true)"
          fi

          release="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$current_version" != "$previous_version" ]; then
            release="true"
          fi

          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$current_version" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "current_version=$current_version"
          echo "previous_version=${previous_version:-<none>}"
          echo "release=$release"

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew :zerobot-plugin-api:test :zerobot-core:test :zerobot-app:test

      - name: Build release zip
        run: |
          chmod +x dist/start.sh
          ./gradlew releaseZip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerobot-${{ needs.detect-release.outputs.version }}
          path: build/distributions/*.zip

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ZeroBot ${{ needs.detect-release.outputs.version }}
          files: build/distributions/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-plugin-api:
    name: Publish Plugin API
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Publish plugin API to Maven
        env:
          ZEROBOT_MAVEN_URL: ${{ secrets.ZEROBOT_MAVEN_URL }}
          ZEROBOT_MAVEN_USERNAME: ${{ secrets.ZEROBOT_MAVEN_USERNAME }}
          ZEROBOT_MAVEN_PASSWORD: ${{ secrets.ZEROBOT_MAVEN_PASSWORD }}
        run: ./gradlew :zerobot-plugin-api:uploadPluginApi
